<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>MeetScribe — Turn Meetings into Actionable Requirements with AI</title>
    <meta name="description" content="Upload meeting recordings and let AI extract user stories, acceptance criteria, and action items. Export directly to Jira, Azure DevOps, or Linear." />
    <meta name="keywords" content="meeting transcription, AI requirements extraction, user stories, acceptance criteria, meeting to action items, agile requirements, sprint planning tool" />
    <meta name="author" content="MeetScribe" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://meetscribe.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://meetscribe.com/" />
    <meta property="og:title" content="MeetScribe — Turn Meetings into Actionable Requirements with AI" />
    <meta property="og:description" content="Upload meeting recordings and let AI extract user stories, acceptance criteria, and action items. Export directly to Jira, Azure DevOps, or Linear." />
    <meta property="og:image" content="https://meetscribe.com/og-image.png" />
    <meta property="og:site_name" content="MeetScribe" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://meetscribe.com/" />
    <meta name="twitter:title" content="MeetScribe — Turn Meetings into Actionable Requirements with AI" />
    <meta name="twitter:description" content="Upload meeting recordings and let AI extract user stories, acceptance criteria, and action items. Export directly to Jira, Azure DevOps, or Linear." />
    <meta name="twitter:image" content="https://meetscribe.com/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "MeetScribe",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "AI-powered meeting transcription and requirements extraction tool. Upload meeting recordings and get structured user stories, acceptance criteria, and action items.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "120"
      }
    }
    </script>

    <!-- Structured Data - FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How does MeetScribe extract requirements from meetings?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "MeetScribe uses AI to transcribe your meeting audio, then identifies and structures user stories, acceptance criteria, action items, and decisions from the conversation."
          }
        },
        {
          "@type": "Question",
          "name": "What audio formats does MeetScribe support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "MeetScribe supports MP3, WAV, M4A, WebM, and most common audio formats. Files up to 200MB are supported."
          }
        },
        {
          "@type": "Question",
          "name": "Can I export requirements to project management tools?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, MeetScribe integrates with Azure DevOps, Jira, and Linear. You can export extracted requirements directly as work items with proper formatting."
          }
        }
      ]
    }
    </script>

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
